<title>Crossing Challenge 🏁</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family:'Nunito',sans-serif; overflow:hidden; user-select:none;
  }
  h1 { font-family:'Boogaloo',cursive; color:#fff; font-size:2rem; letter-spacing:2px; margin-bottom:6px; text-shadow:0 0 20px rgba(255,200,0,0.6); }
  #score-bar { display:flex; gap:28px; margin-bottom:10px; font-size:1rem; color:#ffe; }
  #score-bar span { font-weight:900; color:#ffd700; font-size:1.1rem; }
  #game-wrapper { position:relative; width:360px; border-radius:16px; overflow:hidden; box-shadow:0 10px 50px rgba(0,0,0,0.7); border:3px solid #2a4a8a; }
  canvas { display:block; }
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(5,5,25,0.92); color:white; text-align:center; padding:28px; }
  #overlay .emoji { font-size:3.5rem; margin-bottom:8px; }
  #overlay h2 { font-family:'Boogaloo',cursive; font-size:2.2rem; color:#ffd700; text-shadow:0 0 20px #ffd700bb; margin-bottom:10px; }
  #overlay p { font-size:1rem; color:#ccc; line-height:1.6; margin-bottom:4px; }
  #start-btn { margin-top:18px; background:linear-gradient(135deg,#ffd700,#ff8c00); color:#1a1a2e; border:none; border-radius:50px; padding:13px 40px; font-size:1.2rem; font-family:'Boogaloo',cursive; cursor:pointer; letter-spacing:1px; box-shadow:0 4px 20px rgba(255,180,0,0.5); transition:transform .12s, box-shadow .12s; }
  #start-btn:hover { transform:scale(1.07); box-shadow:0 6px 30px rgba(255,180,0,0.7); }
  #start-btn:active { transform:scale(0.96); }
  #hint { margin-top:14px; font-size:0.82rem; color:#666; }
  .k { display:inline-block; background:#333; border:1px solid #555; border-radius:4px; padding:1px 6px; font-size:0.78rem; color:#ddd; margin:0 1px; }
</style>

const overlay=document.getElementById('overlay'),ot=document.getElementById('ot'),om=document.getElementById('om');
const startBtn=document.getElementById('start-btn'),sd=document.getElementById('sd'),bd=document.getElementById('bd');
let score=0,best=0,gameRunning=false,raf,player,lanes,frame;

// DIFFICULTY SETTINGS (reduced)
const BASE_SPEED = 0.45;
const MAX_SPEED_MULT = 1.03;
const GAP_MIN = 110;
const GAP_RAND = 110;
const FLAGS_PER_LANE = 4;
const COLLISION_W = 22;
const COLLISION_H = 15;

// Zone label sizes
const ZONE_H = CELL; // one cell tall for start/end zones

function initGame(){
  score=0;sd.textContent=0;frame=0;
  player={col:Math.floor(COLS/2),row:ROWS-1,x:0,y:0,tx:0,ty:0,alive:true,celebrating:false,celebF:0};
  snapPlayer();lanes=[];
  for(let r=1;r<ROWS-1;r++){
    const dir=Math.random()<0.5?1:-1;
    const spd=(BASE_SPEED+Math.random()*0.5)*dir;
    const gap=GAP_MIN+Math.random()*GAP_RAND;
    const type=Math.random()<0.5?'cz':'sk',flags=[];
    let sx=Math.random()*W;
    for(let i=0;i<FLAGS_PER_LANE;i++) flags.push({x:sx+i*gap});
    lanes.push({row:r,spd,flags,type});
  }
}
function snapPlayer(){
  player.x=player.col*CELL+CELL/2;player.y=player.row*CELL+CELL/2;
  player.tx=player.x;player.ty=player.y;
}

function drawCZ(cx,cy,w,h){
  const x=cx-w/2,y=cy-h/2;
  ctx.fillStyle='#fff';ctx.fillRect(x,y,w,h/2);
  ctx.fillStyle='#D7141A';ctx.fillRect(x,y+h/2,w,h/2);
  ctx.fillStyle='#11457E';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w*0.45,y+h/2);ctx.lineTo(x,y+h);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
}
function drawSK(cx,cy,w,h){
  const x=cx-w/2,y=cy-h/2,th=h/3;
  ctx.fillStyle='#fff';ctx.fillRect(x,y,w,th);
  ctx.fillStyle='#0B4EA2';ctx.fillRect(x,y+th,w,th);
  ctx.fillStyle='#EE1C25';ctx.fillRect(x,y+th*2,w,th);
  const sx=x+w*0.12,sy=y+h*0.18,sw=w*0.28,sh=h*0.58,cx2=sx+sw/2;
  ctx.fillStyle='#EE1C25';ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+sw,sy);ctx.lineTo(sx+sw,sy+sh*0.62);ctx.quadraticCurveTo(cx2,sy+sh,sx,sy+sh*0.62);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';
  ctx.fillRect(cx2-sw*0.08,sy+h*0.08,sw*0.16,sh*0.56);
  ctx.fillRect(cx2-sw*0.24,sy+h*0.25,sw*0.48,sh*0.11);
  ctx.fillRect(cx2-sw*0.24,sy+h*0.42,sw*0.48,sh*0.11);
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
}
function drawFlag(type,cx,cy){if(type==='cz')drawCZ(cx,cy,54,36);else drawSK(cx,cy,54,36);}

function drawBG(){
  // START zone (bottom) - "IGNORANCIA"
  ctx.fillStyle='#1b5e20';ctx.fillRect(0,(ROWS-1)*CELL,W,CELL);
  ctx.fillStyle='#fff';ctx.font='bold 15px Nunito,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🚩 IGNORANCIA 🚩', W/2, (ROWS-1)*CELL + CELL/2);

  // END zone (top) - "CHECOSLOVAQUIA"
  ctx.fillStyle='#1b5e20';ctx.fillRect(0,0,W,CELL);
  ctx.fillStyle='#ffd700';ctx.font='bold 14px Nunito,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🏆 CHECOSLOVAQUIA 🏆', W/2, CELL/2);

  // Checkered pattern overlaid subtly on end zone
  const sq=CELL/6;
  for(let i=0;i<Math.ceil(W/sq);i++)for(let j=0;j<Math.ceil(CELL/sq);j++){
    ctx.fillStyle=(i+j)%2===0?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.08)';
    ctx.fillRect(i*sq,j*sq,sq,sq);
  }

  ctx.textAlign='start';ctx.textBaseline='alphabetic';

  // Road lanes
  for(let r=1;r<ROWS-1;r++){
    ctx.fillStyle=r%2===0?'#292929':'#333';ctx.fillRect(0,r*CELL,W,CELL);
    ctx.save();ctx.strokeStyle='rgba(255,220,0,0.13)';ctx.setLineDash([14,10]);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(W,r*CELL);ctx.stroke();ctx.restore();
  }
}

function drawPlayer(){
  if(!player.alive)return;
  ctx.save();ctx.translate(player.x,player.y);
  if(player.celebrating){const b=Math.abs(Math.sin(player.celebF*0.32))*9;ctx.translate(0,-b);ctx.rotate(Math.sin(player.celebF*0.18)*0.12);}
  if(playerReady){
    // Draw image as square (no background removal)
    const s=PS*1.1;
    ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=10;ctx.shadowOffsetY=3;
    ctx.drawImage(playerImg,-s/2,-s/2,s,s);
    ctx.shadowBlur=0;
    // Gold border ring
    ctx.strokeStyle='#ffd700';ctx.lineWidth=2.5;
    ctx.strokeRect(-s/2,-s/2,s,s);
  } else {
    ctx.fillStyle='#ffaa66';ctx.beginPath();ctx.arc(0,0,PS/2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawFlags(){
  lanes.forEach(lane=>{
    const fy=lane.row*CELL+CELL/2;
    lane.flags.forEach(fl=>{
      const fx=((fl.x%W)+W)%W;drawFlag(lane.type,fx,fy);
      if(fx<30)drawFlag(lane.type,fx+W,fy);
      if(fx>W-30)drawFlag(lane.type,fx-W,fy);
    });
  });
}

function checkCollision(){
  if(player.row===0||player.row===ROWS-1)return;
  const lane=lanes[player.row-1];if(!lane)return;
  lane.flags.forEach(fl=>{
    const fx=((fl.x%W)+W)%W,fy=lane.row*CELL+CELL/2;
    if(Math.abs(player.x-fx)<COLLISION_W&&Math.abs(player.y-fy)<COLLISION_H)killPlayer();
  });
}

function killPlayer(){
  if(!player.alive)return;
  player.alive=false;
  setTimeout(showGameOver,700);
}

function showGameOver(){
  if(score>best)best=score;bd.textContent=best;
  ot.textContent='😵 ¡Chocaste!';
  om.innerHTML='¡Chocaste con la inteligencia Juliana! 🧠<br>Llegaste a <strong>'+score+' puntos</strong>.';
  startBtn.textContent='¡REINTENTAR!';
  overlay.style.display='flex';
  gameRunning=false;
}

function showWin(){
  if(score>best)best=score;bd.textContent=best;
  ot.textContent='🏆 ¡Lo lograste!';
  om.innerHTML='<strong>¡Llegaste a Checoslovaquia Juliana! 🎉</strong><br>Puntos: <strong>'+score+'</strong>';
  startBtn.textContent='¡JUGAR DE NUEVO!';
  overlay.style.display='flex';
  gameRunning=false;
}

function update(){
  frame++;
  lanes.forEach(l=>l.flags.forEach(fl=>{fl.x+=l.spd;}));
  player.x+=(player.tx-player.x)*0.32;player.y+=(player.ty-player.y)*0.32;
  if(player.celebrating){
    player.celebF++;
    if(player.celebF>55){
      score+=10;sd.textContent=score;
      lanes.forEach(l=>{
        l.spd*=MAX_SPEED_MULT;
        if(Math.random()<0.25){
          const last=Math.max(...l.flags.map(f=>f.x));
          l.flags.push({x:last+GAP_MIN+Math.random()*40});
        }
      });
      player.row=ROWS-1;player.col=Math.floor(COLS/2);snapPlayer();
      player.celebrating=false;player.celebF=0;
    }
    return;
  }
  checkCollision();
}

function render(){
  ctx.clearRect(0,0,W,H);drawBG();drawFlags();drawPlayer();
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(8,8,96,28);
  ctx.fillStyle='#ffd700';ctx.font='bold 15px Nunito,sans-serif';ctx.fillText('★  '+score,16,27);
  if(!player.alive){
    ctx.font='2.8rem serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('💥',player.x,player.y);
    ctx.textAlign='start';ctx.textBaseline='alphabetic';
  }
  if(player.celebrating&&player.celebF<20){
    ctx.font='2rem serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⭐',player.x,player.y-PS);
    ctx.textAlign='start';ctx.textBaseline='alphabetic';
  }
}

function loop(){if(!gameRunning)return;update();render();raf=requestAnimationFrame(loop);}

function move(dir){
  if(!player.alive||player.celebrating)return;
  let nr=player.row,nc=player.col;
  if(dir==='up')nr=Math.max(0,player.row-1);
  if(dir==='down')nr=Math.min(ROWS-1,player.row+1);
  if(dir==='left')nc=Math.max(0,player.col-1);
  if(dir==='right')nc=Math.min(COLS-1,player.col+1);
  player.row=nr;player.col=nc;
  player.tx=nc*CELL+CELL/2;player.ty=nr*CELL+CELL/2;
  if(nr===0){player.celebrating=true;player.celebF=0;setTimeout(showWin,800);}
}

document.addEventListener('keydown',e=>{
  if(!gameRunning)return;
  const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',KeyW:'up',KeyS:'down',KeyA:'left',KeyD:'right'};
  if(m[e.code]){e.preventDefault();move(m[e.code]);}
});
let ts=null;
cv.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault();},{passive:false});
cv.addEventListener('touchend',e=>{
  if(!ts||!gameRunning)return;
  const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y;
  const ax=Math.abs(dx),ay=Math.abs(dy);
  if(ax<8&&ay<8)move('up');else if(ax>ay)move(dx>0?'right':'left');else move(dy>0?'down':'up');
  ts=null;e.preventDefault();
},{passive:false});

startBtn.addEventListener('click',()=>{
  overlay.style.display='none';if(raf)cancelAnimationFrame(raf);
  initGame();gameRunning=true;loop();
});
drawBG();
</script>
</body>
</html>
